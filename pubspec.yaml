name: vision
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # Camera & Image
  camera: ^0.11.0
  flutter_dotenv: ^6.0.0
  http: ^1.6.0
  image_picker: ^1.1.2
  image: ^4.1.7
  provider: ^6.1.5

  # ML Kit
  google_mlkit_image_labeling: ^0.12.1
  google_mlkit_text_recognition: ^0.13.1
  google_mlkit_object_detection: ^0.13.0

  # TensorFlow Lite
  tflite_flutter: ^0.11.0

  # Model download & storage
  path_provider: ^2.1.2
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
