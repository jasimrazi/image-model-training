name: Build APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create CI environment asset
        run: |
          if [ -n "${{ secrets.DOTENV }}" ]; then
            printf '%s' "${{ secrets.DOTENV }}" > .env
          elif [ ! -f .env ]; then
            touch .env
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze project
        run: flutter analyze --no-fatal-infos

      - name: Build release APK
        run: flutter build apk --release

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk "build/app/outputs/flutter-apk/vision_apk(v1.0.0).apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: vision_apk(v1.0.0)
          path: build/app/outputs/flutter-apk/vision_apk(v1.0.0).apk
          if-no-files-found: error

      - name: Publish APK to GitHub Releases
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: vision_apk(v1.0.0)
          files: build/app/outputs/flutter-apk/vision_apk(v1.0.0).apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
